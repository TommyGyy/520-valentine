<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>精灵编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#ddd;font-family:monospace;display:flex;height:100vh}
#panel{width:310px;padding:12px;overflow-y:auto;background:#2a2a2a;border-right:2px solid #444;display:flex;flex-direction:column;gap:6px}
#panel h3{color:#f0b860}
.scene-btn{display:block;width:100%;padding:8px;background:#3a3a3a;border:1px solid #555;color:#ddd;cursor:pointer;text-align:left;font-family:monospace;font-size:12px}
.scene-btn.active{background:#5a4030;border-color:#f0b860}
.sp{background:#333;border-radius:4px;padding:8px}
.sp.sel{border:1px solid #f0b860;background:#3a3028}
.sp .n{font-size:12px;font-weight:bold;margin-bottom:4px}
.sp .r{display:flex;gap:4px;align-items:center;margin:2px 0}
.sp .r label{font-size:10px;color:#aaa;width:16px;text-align:right}
.sp input[type=number]{width:58px;background:#444;border:1px solid #666;color:#fff;padding:2px 4px;font-family:monospace;font-size:11px;outline:none}
.sp input[type=number]:focus{border-color:#f0b860}
.sp .anim{padding:6px;margin-top:4px;background:#2a2a2a;border-radius:3px}
.sp .anim .r label{width:28px}
#ctls{background:#333;padding:8px;border-radius:4px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
#ctls button{background:#5a4030;border:1px solid #f0b860;color:#fff;padding:6px 10px;cursor:pointer;font-family:monospace;font-size:11px}
#ctls button:hover{background:#7a5040}
#ctls button.save{background:#3a6030;border-color:#5a9040}
#time-slider{width:100%}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;border:2px solid #555}
#info{position:absolute;bottom:8px;left:8px;font-size:12px;color:#888;background:rgba(0,0,0,.7);padding:4px 8px;pointer-events:none}
</style>
</head>
<body>
<div id="panel">
  <h3>精灵编辑器</h3>
  <button class="scene-btn active" id="btn-sc0" onclick="switchScene(0)">标题画面</button>
  <button class="scene-btn" id="btn-sc1" onclick="switchScene(1)">滑雪场景</button>
  <button class="scene-btn" id="btn-sc2" onclick="switchScene(2)">木屋场景</button>
  <div id="ctls">
    <button id="btn-play" onclick="togglePlay()">▶ 播放</button>
    <button onclick="resetAnim()">↺ 重置</button>
    <button class="save" onclick="saveScene()">💾 保存</button>
    <span style="font-size:10px;color:#888;margin-left:4px" id="time-label">0.0s</span>
    <input type="range" id="time-slider" min="0" max="1000" value="0" oninput="seekAnim(this.value)" style="width:100%;margin-top:4px">
  </div>
  <div id="sprite-panel"></div>
  <p style="font-size:10px;color:#888">拖拽=移动 | 滚轮=缩放 | F=翻转 | 输入框直接编辑</p>
</div>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="info">点击精灵查看坐标</div>
</div>
<script>
const W=480,H=270;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let scale=3,curScene=0,selected=null,dragging=null,images={},dragOx=0,dragOy=0;
let playing=false,animTime=0,lastFrame=0;

const scenes=[
{name:'标题',bg:'bg-title.png',sprites:[
  {key:'boy',src:'boy-stand.png',x:175,y:190,h:36,flip:false,anim:{enabled:false,startX:175,endX:175,dur:5,loop:true}},
  {key:'girl',src:'girl-stand.png',x:210,y:190,h:36,flip:false,anim:{enabled:false,startX:210,endX:210,dur:5,loop:true}},
  {key:'dog',src:'dog.png',x:250,y:200,h:22,flip:false,anim:{enabled:false,startX:250,endX:250,dur:5,loop:true}},
]},
{name:'滑雪',bg:'bg-ski.png',sprites:[
  {key:'boySki',src:'boy-ski.png',x:100,y:148,h:34,flip:false,anim:{enabled:true,startX:-60,endX:500,dur:10,loop:true}},
  {key:'girlSki',src:'girl-ski.png',x:130,y:148,h:34,flip:false,anim:{enabled:true,startX:-20,endX:500,dur:10,loop:true}},
  {key:'dog',src:'dog.png',x:180,y:154,h:22,flip:false,anim:{enabled:true,startX:50,endX:500,dur:8,loop:true}},
]},
{name:'木屋',bg:'bg-cabin.png',sprites:[
  {key:'boy',src:'boy-stand.png',x:80,y:162,h:34,flip:false,anim:{enabled:false,startX:80,endX:80,dur:5,loop:true}},
  {key:'girl',src:'girl-stand.png',x:110,y:162,h:34,flip:false,anim:{enabled:false,startX:110,endX:110,dur:5,loop:true}},
  {key:'dog',src:'dog.png',x:290,y:178,h:22,flip:false,anim:{enabled:false,startX:290,endX:290,dur:5,loop:true}},
]}];

function resize(){
  let maxW=innerWidth-330,maxH=innerHeight;
  scale=Math.min(Math.floor(maxW/W),Math.floor(maxH/H),4);
  canvas.width=W*scale;canvas.height=H*scale;ctx.imageSmoothingEnabled=false;
}
resize();addEventListener('resize',resize);
for(let sc of scenes){
  let img=new Image();img.src=sc.bg;images[sc.bg]=img;
  for(let sp of sc.sprites){let img=new Image();img.src=sp.src;images[sp.src]=img}
}

function switchScene(i){
  curScene=i;
  document.querySelectorAll('.scene-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  selected=null;playing=false;animTime=0;updatePlayBtn();
  buildPanel();
}
function togglePlay(){playing=!playing;if(playing)lastFrame=performance.now();updatePlayBtn()}
function updatePlayBtn(){document.getElementById('btn-play').textContent=playing?'⏸ 暂停':'▶ 播放'}
function resetAnim(){animTime=0;playing=false;updatePlayBtn();document.getElementById('time-slider').value=0;document.getElementById('time-label').textContent='0.0s'}
function seekAnim(v){animTime=+v/1000*getMaxDur();document.getElementById('time-label').textContent=animTime.toFixed(1)+'s'}
function getMaxDur(){let max=5;for(let sp of scenes[curScene].sprites){let a=sp.anim;if(a.enabled){let d=a.loop?a.dur:a.dur*2;if(d>max)max=d}}return max}

function getSpriteX(sp,t){
  let a=sp.anim;
  if(!a.enabled||!playing)return sp.x;
  let dur=a.dur;
  if(a.loop){
    let p=((t%dur)+dur)%dur/dur;
    return a.startX+(a.endX-a.startX)*p;
  }else{
    let p=Math.min(1,Math.max(0,t/dur));
    return a.startX+(a.endX-a.startX)*p;
  }
}

// Build panel with real DOM nodes (not innerHTML) so inputs survive re-renders
function buildPanel(){
  let container=document.getElementById('sprite-panel');
  container.innerHTML='';
  let sps=scenes[curScene].sprites;
  for(let i=0;i<sps.length;i++){
    let sp=sps[i],a=sp.anim;
    let div=document.createElement('div');div.className='sp'+(i===selected?' sel':'');
    div.addEventListener('mousedown',e=>{if(e.target.tagName!=='INPUT'&&e.target.tagName!=='LABEL'){selectSprite(i)}});

    let name=document.createElement('div');name.className='n';name.textContent=sp.key+' ('+sp.src+')';div.appendChild(name);

    // x, y, h row
    let row1=document.createElement('div');row1.className='r';
    let lx=document.createElement('label');lx.textContent='x';row1.appendChild(lx);
    let ix=makeNumInput(sp.x,v=>{sp.x=v});
    row1.appendChild(ix);
    let ly=document.createElement('label');ly.textContent='y';row1.appendChild(ly);
    let iy=makeNumInput(sp.y,v=>{sp.y=v});
    row1.appendChild(iy);
    let lh=document.createElement('label');lh.textContent='h';row1.appendChild(lh);
    let ih=makeNumInput(sp.h,v=>{sp.h=Math.max(1,v)});
    row1.appendChild(ih);
    div.appendChild(row1);

    // flip checkbox
    let row2=document.createElement('div');row2.className='r';
    let cf=document.createElement('input');cf.type='checkbox';cf.checked=sp.flip;
    cf.addEventListener('change',()=>{sp.flip=cf.checked});
    row2.appendChild(cf);
    let lf=document.createElement('label');lf.textContent='水平翻转';lf.style.width='auto';
    row2.appendChild(lf);
    div.appendChild(row2);

    // anim section
    let animDiv=document.createElement('div');animDiv.className='anim';

    let ra0=document.createElement('div');ra0.className='r';
    let ce=document.createElement('input');ce.type='checkbox';ce.checked=a.enabled;
    ce.addEventListener('change',()=>{a.enabled=ce.checked});
    ra0.appendChild(ce);
    let le=document.createElement('label');le.textContent='动画';le.style.width='auto';le.style.color='#f0b860';
    ra0.appendChild(le);
    animDiv.appendChild(ra0);

    let ra1=document.createElement('div');ra1.className='r';
    let l1=document.createElement('label');l1.textContent='起x';l1.style.width='28px';ra1.appendChild(l1);
    let isx=makeNumInput(a.startX,v=>{a.startX=v});
    ra1.appendChild(isx);
    let l2=document.createElement('label');l2.textContent='止x';l2.style.width='28px';ra1.appendChild(l2);
    let iex=makeNumInput(a.endX,v=>{a.endX=v});
    ra1.appendChild(iex);
    animDiv.appendChild(ra1);

    let ra2=document.createElement('div');ra2.className='r';
    let l3=document.createElement('label');l3.textContent='时长';l3.style.width='28px';ra2.appendChild(l3);
    let idu=makeNumInput(a.dur,v=>{a.dur=Math.max(0.5,v)},'0.5');
    idu.step='0.5';idu.min='0.5';
    ra2.appendChild(idu);
    let cl=document.createElement('input');cl.type='checkbox';cl.checked=a.loop;
    cl.addEventListener('change',()=>{a.loop=cl.checked});
    ra2.appendChild(cl);
    let ll=document.createElement('label');ll.textContent='循环';ll.style.width='auto';
    ra2.appendChild(ll);
    animDiv.appendChild(ra2);

    div.appendChild(animDiv);
    container.appendChild(div);
  }
}

function makeNumInput(val,onChange,step){
  let inp=document.createElement('input');inp.type='number';inp.value=val;
  if(step)inp.step=step;
  inp.addEventListener('input',()=>{onChange(+inp.value)});
  inp.addEventListener('mousedown',e=>{e.stopPropagation()});
  return inp;
}

function selectSprite(i){selected=i;buildPanel()}

function updateSelectedClass(){
  let items=document.getElementById('sprite-panel').children;
  for(let j=0;j<items.length;j++)items[j].classList.toggle('sel',j===selected);
}

function getClickSprite(mx,my){
  let sps=scenes[curScene].sprites;
  for(let i=sps.length-1;i>=0;i--){
    let sp=sps[i];let img=images[sp.src];if(!img)continue;
    let cx=playing?getSpriteX(sp,animTime):sp.x;
    let w=sp.h*img.width/img.height;
    if(mx>=cx&&mx<=cx+w&&my>=sp.y&&my<=sp.y+sp.h)return i;
  }
  return null;
}

canvas.addEventListener('mousedown',e=>{
  let rect=canvas.getBoundingClientRect();
  let mx=(e.clientX-rect.left)/scale,my=(e.clientY-rect.top)/scale;
  let idx=getClickSprite(mx,my);
  if(idx!==null){
    selected=idx;dragging=idx;updateSelectedClass();
    let sp=scenes[curScene].sprites[idx];
    let cx=playing?getSpriteX(sp,animTime):sp.x;
    dragOx=mx-cx;dragOy=my-sp.y;
  }else{selected=null;updateSelectedClass()}
});
canvas.addEventListener('mousemove',e=>{
  let rect=canvas.getBoundingClientRect();
  let mx=(e.clientX-rect.left)/scale,my=(e.clientY-rect.top)/scale;
  if(dragging!==null){
    let sp=scenes[curScene].sprites[dragging];
    let newX=Math.round(mx-dragOx);
    if(playing){let dx=newX-sp.x;sp.anim.startX+=dx;sp.anim.endX+=dx}
    sp.x=newX;sp.y=Math.round(my-dragOy);
    syncInputs();
  }
  document.getElementById('info').textContent='鼠标: ('+Math.round(mx)+', '+Math.round(my)+')';
});
canvas.addEventListener('mouseup',()=>{dragging=null});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  let rect=canvas.getBoundingClientRect();
  let mx=(e.clientX-rect.left)/scale,my=(e.clientY-rect.top)/scale;
  let idx=getClickSprite(mx,my);
  if(idx!==null){
    let sp=scenes[curScene].sprites[idx];
    sp.h=Math.max(4,sp.h+(e.deltaY>0?-2:2));sp.h=Math.round(sp.h);
    syncInputs();
  }
},{passive:false});
addEventListener('keydown',e=>{
  if(e.key==='f'||e.key==='F'){
    if(selected!==null){
      let sp=scenes[curScene].sprites[selected];
      sp.flip=!sp.flip;syncInputs();
    }
  }
});

function syncInputs(){
  let container=document.getElementById('sprite-panel');
  let sps=scenes[curScene].sprites;
  let items=container.children;
  for(let i=0;i<items.length&&i<sps.length;i++){
    let sp=sps[i],a=sp.anim;
    let inps=items[i].querySelectorAll('input');
    if(inps.length>=3){inps[0].value=sp.x;inps[1].value=sp.y;inps[2].value=sp.h}
    if(inps.length>=4)inps[3].checked=sp.flip;
    if(inps.length>=5)inps[4].checked=a.enabled;
    if(inps.length>=7){inps[5].value=a.startX;inps[6].value=a.endX}
    if(inps.length>=9){inps[7].value=a.dur;inps[8].checked=a.loop}
  }
}

function saveScene(){
  let data=scenes.map(sc=>({name:sc.name,sprites:sc.sprites.map(sp=>({
    key:sp.key,src:sp.src,x:sp.x,y:sp.y,h:sp.h,flip:sp.flip,
    anim:{enabled:sp.anim.enabled,startX:sp.anim.startX,endX:sp.anim.endX,dur:sp.anim.dur,loop:sp.anim.loop}
  }))}));
  let js='// Auto-generated sprite data — edit via sprite-editor.html\nwindow.SPRITE_DATA='+JSON.stringify(data,null,2)+';\n';
  let blob=new Blob([js],{type:'text/javascript'});
  let a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='scene-data.js';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

function render(ts){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(playing){
    let dt=(ts-lastFrame)/1000;lastFrame=ts;
    animTime+=dt;
    let maxDur=getMaxDur();
    document.getElementById('time-slider').value=Math.round((animTime%maxDur)/maxDur*1000);
    document.getElementById('time-label').textContent=animTime.toFixed(1)+'s';
  }
  let sc=scenes[curScene];
  let bgImg=images[sc.bg];
  if(bgImg&&bgImg.complete)ctx.drawImage(bgImg,0,0,W*scale,H*scale);
  for(let i=0;i<sc.sprites.length;i++){
    let sp=sc.sprites[i];let img=images[sp.src];
    if(!img||!img.complete)continue;
    let cx=playing?getSpriteX(sp,animTime):sp.x;
    let w=sp.h*img.width/img.height;
    let sx=cx*scale,sy=sp.y*scale,sw=w*scale,sh=sp.h*scale;
    if(sp.flip){
      ctx.save();ctx.translate(sx+sw/2,sy+sh/2);ctx.scale(-1,1);
      ctx.drawImage(img,0,0,img.width,img.height,-sw/2,-sh/2,sw,sh);ctx.restore();
    }else{
      ctx.drawImage(img,0,0,img.width,img.height,sx,sy,sw,sh);
    }
    if(i===selected){
      ctx.strokeStyle='#f0b860';ctx.lineWidth=2;ctx.strokeRect(sx-1,sy-1,sw+2,sh+2);
      ctx.fillStyle='#f0b860';ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);ctx.fill();
    }
  }
  requestAnimationFrame(render);
}

buildPanel();
requestAnimationFrame(render);
</script>
</body>
</html>
